name: Build Rocky9 Docker img for Slurm build
run-name: ${{ github.actor }} is attempting to build slurm docker image 🚀
on:
  workflow_dispatch:
    inputs:
      nv_driver_version:
        description: NVIDIA driver module stream
        required: false
        default: "580"
      nvml_version:
        description: CUDA NVML package version
        required: false
        default: "13-2"
permissions:
  contents: read
  packages: write
jobs:

  build_el9_slurm_build-image:
    name: Build docker image for slurm build on Rocky9
    runs-on: ubuntu-latest
    steps:
    
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Build
      uses: docker/setup-buildx-action@v4
          
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: docker/rocky9/slurm-build
        push: true
        tags: ghcr.io/${{ github.repository }}/rocky9_slurm-build:latest
        build-args: |
          IMAGE_REPOSITORY=ghcr.io/${{ github.repository }}
          NV_DRIVER_VERSION=${{ inputs.nv_driver_version }}
          NVML_VERSION=${{ inputs.nvml_version }}
