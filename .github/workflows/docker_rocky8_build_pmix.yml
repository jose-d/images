name: Build Rocky8 Docker img for PMI-X build
run-name: ${{ github.actor }} is attempting to build pmi-x docker image 🚀
on: workflow_dispatch
permissions:
  contents: read
  packages: write
jobs:

  build_base8_build-image:
    name: Build docker image for pmi-x build on Rocky8
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Build
      uses: docker/setup-buildx-action@v4
          
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: docker/rocky8/pmix-build
        push: true
        tags: ghcr.io/${{ github.repository }}/rocky8_pmix-build:latest
        build-args: |
          IMAGE_REPOSITORY=ghcr.io/${{ github.repository }}
