---
name: Build Rocky9 Docker imgs
run-name: >-
  ${{ github.actor }} is attempting to build Rocky 9 docker images 🚀
'on':
  workflow_dispatch:
    inputs:
      nvml_version:
        description: CUDA NVML package version
        required: false
        default: '13-2'
permissions:
  contents: read
  packages: write
concurrency:
  group: ${{ github.workflow }}-rocky9
  cancel-in-progress: true
jobs:
  build_base:
    name: Build base docker image for Rocky9
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker/rocky9/base-build
          push: true
          tags: ghcr.io/${{ github.repository }}/rocky9_base-build:latest

  build_base_nv:
    name: Build base_nv docker image for Rocky9
    runs-on: ubuntu-latest
    needs: build_base
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker/rocky9/base_nv-build
          push: true
          tags: ghcr.io/${{ github.repository }}/rocky9_base_nv-build:latest
          build-args: |
            IMAGE_REPOSITORY=ghcr.io/${{ github.repository }}
            NVML_VERSION=${{ inputs.nvml_version }}

  build_pmix:
    name: Build docker image for pmi-x build on Rocky9
    runs-on: ubuntu-latest
    needs: build_base_nv
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker/rocky9/pmix-build
          push: true
          tags: ghcr.io/${{ github.repository }}/rocky9_pmix-build:latest
          build-args: |
            IMAGE_REPOSITORY=ghcr.io/${{ github.repository }}

  build_slurm:
    name: Build docker image for slurm build on Rocky9
    runs-on: ubuntu-latest
    needs: build_pmix
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker/rocky9/slurm-build
          push: true
          tags: ghcr.io/${{ github.repository }}/rocky9_slurm-build:latest
          build-args: |
            IMAGE_REPOSITORY=ghcr.io/${{ github.repository }}
