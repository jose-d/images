name: Build Rocky8 base_nv Docker img
run-name: ${{ github.actor }} is attempting to build rocky 8 base_nv docker image 🚀
on:
  workflow_dispatch:
    inputs:
      nv_driver_version:
        description: NVIDIA driver module stream
        required: false
        default: "open-dkms"
      nvml_version:
        description: CUDA NVML package version
        required: false
        default: "13-2"
permissions:
  contents: read
  packages: write
jobs:
  build_base_nv8_build-image:
    name: Build base_nv docker image for Rocky8
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Build
      uses: docker/setup-buildx-action@v4
          
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: docker/rocky8/base_nv-build
        push: true
        tags: ghcr.io/${{ github.repository }}/rocky8_base_nv-build:latest
        build-args: |
          IMAGE_REPOSITORY=ghcr.io/${{ github.repository }}
          NV_DRIVER_VERSION=${{ inputs.nv_driver_version }}
          NVML_VERSION=${{ inputs.nvml_version }}
