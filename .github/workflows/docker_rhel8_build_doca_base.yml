name: Build RHEL8 DOCA base Docker img
run-name: ${{ github.actor }} is attempting to build RHEL8 DOCA base docker image 🚀
on: workflow_dispatch
permissions:
  contents: read
  packages: write
jobs:
  build_rhel8_doca_base-image:
    name: Build DOCA base docker image for RHEL8
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Build
      uses: docker/setup-buildx-action@v4
          
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: docker/rhel8/doca-base
        push: true
        tags: ghcr.io/${{ github.repository }}/rhel8_doca-base:latest
