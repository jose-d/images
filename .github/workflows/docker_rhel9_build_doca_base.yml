name: Build RHEL9 DOCA base Docker img
run-name: ${{ github.actor }} is attempting to build RHEL9 DOCA base docker image 🚀
on:
  workflow_dispatch:
    inputs:
      doca_gpg_key_url:
        description: Mellanox DOCA repository GPG key URL
        required: false
        default: https://linux.mellanox.com/public/repo/doca/GPG-KEY-Mellanox.pub
permissions:
  contents: read
  packages: write
jobs:
  build_rhel9_doca_base-image:
    name: Build DOCA base docker image for RHEL9
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker/rhel9/doca-base
          build-args: |
            DOCA_GPG_KEY_URL=${{ inputs.doca_gpg_key_url || 'https://linux.mellanox.com/public/repo/doca/GPG-KEY-Mellanox.pub' }}
          push: true
          tags: ghcr.io/${{ github.repository }}/rhel9_doca-base:latest
